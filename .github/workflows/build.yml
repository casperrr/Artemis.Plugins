name: Build Plugins

on: push

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Clone
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: 10.0.x

            - name: Build
              run: dotnet publish -c Release src/Artemis.Plugins.LayerBrushes.Heatmap

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: Heatmap
                  path: src/Artemis.Plugins.LayerBrushes.Heatmap/bin/x64/Release/net10.0/publish