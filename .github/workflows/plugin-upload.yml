name: Reusable Plugin Upload

on:
    workflow_call:
        inputs:
            projectPath:
                description: Path to plugin .csproj
                required: true
                type: string
        secrets:
            WORKSHOP_PAT:
                required: true

jobs:
    build-and-upload:
        runs-on: windows-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                dotnet-version: 10.0.x

            - name: Install Plugin Uploader
              run: dotnet tool install ArtemisRGB.Tools.PluginUploader --global

            - name: Restore
              run: dotnet restore "${{ inputs.projectPath }}"

            - name: Compute paths
              id: compute
              shell: pwsh
              run: |
                $proj = '${{ inputs.projectPath }}'
                $projFolder = Split-Path -Parent $proj
                $publishDir = Join-Path $projFolder 'publish'
                "projectFolder=$projFolder" >> $env:GITHUB_OUTPUT
                "publishDir=$publishDir" >> $env:GITHUB_OUTPUT

            - name: Publish plugin
              shell: pwsh
              run: |
                $publishDir = '${{ steps.compute.outputs.publishDir }}'
                if (Test-Path $publishDir) { Remove-Item $publishDir -Recurse -Force }
                dotnet publish '${{ inputs.projectPath }}' --configuration Release --output $publishDir

            - name: Update plugin.json version
              shell: pwsh
              run: |
                $publishDir = '${{ steps.compute.outputs.publishDir }}'
                $pluginJsonPath = Join-Path $publishDir 'plugin.json'
                $json = Get-Content $pluginJsonPath -Raw | ConvertFrom-Json
                $version = (Get-Data).ToString('yyyy.MMdd.HHmm')
                $json.version = $version
                $json | ConvertToJson -Depth 10 | Set-Content $pluginJsonPath

            - name: Upload to workshop
              run: artemis-plugin-uploader upload --pat ${{ secrets.WORKSHOP_PAT }} --folder "${{ steps.compute.outputs.publishDir }}"